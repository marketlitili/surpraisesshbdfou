<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birthday Surprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:'Anton', 'Playfair Display', Arial, sans-serif;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
}

/* START SCREEN */
#start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#start-btn {
  padding: 15px 40px;
  font-size: 24px;
  background: #ff4da6;
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: 'Anton', sans-serif;
  box-shadow: 0 0 20px #ff4da6;
  transition: transform 0.2s;
}

#start-btn:hover {
  transform: scale(1.1);
}

/* TEXT */
.centerText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.word{
  font-size:clamp(2rem, 8vw, 80px);
  color:#ff4da6;
  opacity:0;
  transition:1s;
  text-shadow:0 0 20px transparent;
}

.word.visible{
  opacity:1;
  text-shadow:0 0 20px #ff4da6;
}

/* SLIDER & GALLERY */
#gallery{
position:absolute;
top:50%;
right:20px;
transform:translateY(-50%);
width:auto;
max-width:600px;
display:none;
overflow:hidden;
padding:20px;
box-sizing:border-box;
}

#gallery-message{
  font-size:24px;
  color:#ff4da6;
  text-align:center;
  opacity:0;
  transition:1s;
  margin-bottom:20px;
}

/* PERBAIKAN: ID photo-grid sekarang konsisten */
.photo-grid{
  display:center;
  flex-direction:column;
  gap:15px;
  opacity:0;
  transition:1s;
  padding:15px;
}
.photo-grid img{
  width:120px;
  aspect-ratio:3/3;
  border-radius:10px;
}

/* Slider Container (Baru ditambahkan agar JS jalan) */
.slider-container {
    position: relative;
    width: 100%;
    height: 300px;
    overflow: hidden;
    margin-top: 20px;
}

.slider {
    display: flex;
    transition: 0.8s;
    height: 100%;
}

.slider img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
    flex-shrink: 0;
}

.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
cursor:pointer;
padding:10px;
background: rgba(255, 77, 166, 0.5);
border-radius: 50%;
z-index: 10;
}

#prev{ left:10px;}
#next{ right:10px;}

/* card photo overlay */
#card-photo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  opacity:0;
  transition:opacity 1s, transform 1s;
  z-index:600;
}
#card-photo.visible{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}
#card-photo img{
  max-width:80vw;
  max-height:80vh;
  border-radius:10px;
}

/* COUNTDOWN */
#countdown{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff4da6;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

/* interactive card */
#interactive-card{
  position:absolute;
  width:200px;
  height:300px;
  top:20%;
  left:70%;
  transform-style:preserve-3d;
  animation:float 4s ease-in-out infinite;
  cursor:pointer;
  z-index:500;
  display:none;
}
#interactive-card.open #card-inner{
  transform: rotateY(180deg);
}
#card-inner{
  width:100%;
  height:100%;
  transition:transform 0.6s;
  transform-style:preserve-3d;
  position:relative;
}
#card-front, #card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  background:#222;
  color:#fff;
  border:2px solid #ff4da6;
  border-radius:10px;
}
#card-back{
  transform:rotateY(180deg);
}

@keyframes float{
  0%{transform: translateY(0px) rotateZ(0deg);}
  50%{transform: translateY(-20px) rotateZ(5deg);}
  100%{transform: translateY(0px) rotateZ(0deg);}
}

#countNumber{
font-size:120px;
color:white;
}

</style>
</head>

<body>
  <canvas id="stars"></canvas>
  <canvas id="matrix"></canvas>

  <!-- AUDIO -->
  <audio id="bgMusic" loop>
    <source src="../odew1/luv1.mp3" type="audio/mpeg">
  </audio>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1 style="color:white; margin-bottom:20px;">__________</h1>
    <button id="start-btn">CLICK START</button>
  </div>

  <div id="countdown"><div id="countNumber">3</div></div>
  
  <!-- floating interactive card -->
  <div id="interactive-card">
    <div id="card-inner">
      <div id="card-front">🎂 Click Me 🎂</div>
      <div id="card-back">Surprise! 🎉</div>
    </div>
  </div>

  <!-- photo that appears when card is opened -->
  <div id="card-photo">
    <img src="../odew1/2.jpeg" alt="Surprise photo">
  </div>

  <div class="centerText">
    <div class="word">HAPPY</div>
    <div class="word">BIRTHDAY</div>
    <div class="word">TO</div>
    <div class="word">PAO</div>
  </div>

  <!-- input "penangkap" yang tak terlihat -->
  <input id="barcode" type="text"
         style="position:absolute;opacity:0;pointer-events:none;"
         autofocus />

  <!-- GALLERY SECTION (DIPINDAHKAN KE BAWAH UNTUK LOGIKA) -->
  <div id="gallery">
      <div id="gallery-message">Look at these memories...</div>
      
      <!-- Slider Container -->
      <div class="slider-container">
          <div class="slider">
              <!-- Ganti src dengan foto-foto Anda -->
              <img src="../odew1/1.jpeg" alt="Photo 1">
              <img src="../odew1/2.jpeg" alt="Photo 2">
              <img src="../odew1/3.jpeg" alt="Photo 3">
          </div>
          <div id="prev" class="btn">&#10094;</div>
          <div id="next" class="btn">&#10095;</div>
      </div>

      <!-- Grid Photos -->
      <div class="photo-grid">
          <img src="../odew1/1.jpeg" alt="Grid 1">
          <img src="../odew1/2.jpeg" alt="Grid 2">
          <img src="../odew1/3.jpeg" alt="Grid 3">
      </div>
  </div>

<script>

/* MATRIX EFFECT */
const starCanvas = document.getElementById("stars");
const starCtx = starCanvas.getContext("2d");
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvases(){
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  starCanvas.width = window.innerWidth;
}
window.addEventListener('resize', resizeCanvases);
resizeCanvases();

// matrix data
const letters = "HAPPYBIRTHDAY123456";
const fontSize = 16;
let columns = canvas.width / fontSize;
let drops = [];
function initMatrix(){
  columns = canvas.width / fontSize;
  drops = [];
  for(let x = 0; x < columns; x++) drops[x] = 1;
}
initMatrix();

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#ff4da6";
  ctx.font = fontSize + "px monospace";
  for(let i = 0; i < drops.length; i++){
    let text = letters.charAt(Math.floor(Math.random()*letters.length));
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;
    drops[i]++;
  }
}

// starfield
const stars = [];
function initStars(){
  stars.length = 0;
  for(let i = 0; i < 200; i++){
    stars.push({x: Math.random()*starCanvas.width, y: Math.random()*starCanvas.height, r: Math.random()*1.5, alpha: Math.random()});
  }
}
initStars();

function drawStars(){
  starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
  starCtx.fillStyle = "white";
  stars.forEach(s=>{
    starCtx.globalAlpha = s.alpha;
    starCtx.beginPath();
    starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    starCtx.fill();
    s.alpha += (Math.random()-0.5)*0.02;
    if(s.alpha < 0) s.alpha = 0;
    if(s.alpha > 1) s.alpha = 1;
  });
  starCtx.globalAlpha = 1;
}

function animateBackground(){
  drawStars();
  drawMatrix();
}

// LOGIKA UTAMA (START BUTTON)
const startBtn = document.getElementById('start-btn');
const startScreen = document.getElementById('start-screen');
const bgMusic = document.getElementById('bgMusic');

startBtn.addEventListener('click', () => {
  startScreen.style.display = 'none';
  bgMusic.volume = 0.5; 
  bgMusic.play().catch(error => {
    console.log("Audio play failed: ", error);
  });
  startCountdown();
});

function startCountdown(){
  let count = 3;
  const countdownDiv = document.getElementById('countdown');
  const countNumber = document.getElementById('countNumber');

  setInterval(animateBackground, 33);

  const countdownInterval = setInterval(() => {
    count--;
    if(count > 0){
      countNumber.textContent = count;
    } else {
      clearInterval(countdownInterval);
      countdownDiv.style.display = 'none';
      startAnimations();
    }
  }, 1000);
}

function startAnimations(){
  const words = document.querySelectorAll('.centerText .word');
  let idx = 0;
  function showNextWord(){
    if(idx < words.length){
      words[idx].classList.add('visible');
      idx++;
      setTimeout(showNextWord, 1500);
    } else {
      setTimeout(() => {
        document.querySelector(".centerText").style.display = "none";
        const card = document.getElementById('interactive-card');
        card.style.display = 'block';
        setTimeout(() => {
          document.getElementById("gallery").style.display = "block";
          animateGallery();
        }, 2000);
      }, 1000);
    }
  }
  setTimeout(showNextWord, 2000);
}

// gallery animations
function animateGallery(){
  const msg = document.getElementById('gallery-message');
  const grid = document.querySelector(".photo-grid"); // PERBAIKAN: Menggunakan querySelector
  setTimeout(()=>{ msg.style.opacity = 1 }, 500);
  setTimeout(()=>{ grid.style.opacity = 1 }, 1000);
}

// interactive card behavior
const card = document.getElementById('interactive-card');
const cardPhoto = document.getElementById('card-photo');
card.addEventListener('click', () => {
  card.classList.toggle('open');
  if(card.classList.contains('open')){
    cardPhoto.classList.add('visible');
  } else {
    cardPhoto.classList.remove('visible');
  }
});

cardPhoto.addEventListener('click', () => {
  if(cardPhoto.classList.contains('visible')){
    window.location.href = 'heart.html';
  }
});

/* SLIDER LOGIC */
let index = 0;
const slider = document.querySelector(".slider"); // PERBAIKAN: Menggunakan querySelector
const total = slider.children.length;

document.getElementById("next").onclick = () => {
  index++;
  if(index >= total) index = 0;
  slider.style.transform = "translateX(-" + index*100 + "%)";
}

document.getElementById("prev").onclick = () => {
  index--;
  if(index < 0) index = total-1;
  slider.style.transform = "translateX(-" + index*100 + "%)";
}

/* BARCODE INPUT */
const inp = document.getElementById('barcode');
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const kode = inp.value.trim();
    if (!kode) return;
    window.location.href = 'ode1.php?kode=' + encodeURIComponent(kode);
  }
});
inp.addEventListener('blur', () => inp.value = '');

</script>
</body>
</html>
